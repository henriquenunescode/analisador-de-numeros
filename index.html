<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Numeros</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <h1>Analisador de Números</h1>

    <section>

        <div id="div1">
            <label for="num"><span class="titulosDaSection">Número</span><span id="span1e100">(entre 1 e 100)</span></label>
            <input type="number" id="num" name="num">
            <input type="button" id="btnEnviar" value="Enviar">
        </div>

        <div id="div2">
            <label for="numAdicionados"><span class="titulosDaSection">Números Adicionados</span></label>
            <select id="numAdicionados">
            </select>

            <input type="button" id="btnFinalizar" value="Finalizar">
            <input type="button" id="btnLimpar" value="Limpar">
        </div>

        <div id="div3">

        </div>

    </section>

    <footer>
        <p>&copy; Henrique Bonito</p>
    </footer>

</body>

</html>
